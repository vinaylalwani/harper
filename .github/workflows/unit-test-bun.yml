name: Unit Tests (Bun)

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  unit-test-bun:
    name: Unit Test (Bun)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build || true # we currently have type errors so just ignore that

      - name: Run tests (CJS)
        run: bun run test:unit:all

      - name: Run tests (TypeStrip)
        run: bun --bun run test:unit:typestrip:all
